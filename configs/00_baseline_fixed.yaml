phase: P0
seed: 0
data:
  train_dir: Offroad_Segmentation_Training_Dataset/train
  val_dir: Offroad_Segmentation_Training_Dataset/val
  test_dir: Offroad_Segmentation_testImages
  use_precomputed_masks: true
model:
  backbone: dinov2_vits14
  decoder: convnext_head
  image_size: [266, 476]
training:
  epochs: 10
  batch_size: 2
  lr: 0.0001
  optimizer: sgd
  loss: cross_entropy
  amp: bf16
gates:
  require_aug_preview: true
  require_smoke_test: true

